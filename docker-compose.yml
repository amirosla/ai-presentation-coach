services:
  fishjam:
    image: ghcr.io/fishjam-dev/fishjam:latest
    container_name: fishjam
    ports:
      - "5002:5002"   # HTTP API + dashboard
      - "5003:5003"   # WebRTC signaling (WS)
      - "50000-50050:50000-50050/udp"  # WebRTC media (UDP)
    environment:
      - FJ_SERVER_API_TOKEN=${FISHJAM_SERVER_TOKEN}
      - FJ_HOST=localhost
      - FJ_PORT=5002
      - FJ_WEBRTC_USED_TURN_PORT_RANGE=50000-50050
    restart: unless-stopped

  smelter:
    image: ghcr.io/software-mansion/smelter:latest
    container_name: smelter
    ports:
      - "8081:8081"   # Smelter HTTP API
      - "9000:9000"   # Smelter WHIP/WHEP
    environment:
      - SMELTER_API_PORT=8081
    restart: unless-stopped
